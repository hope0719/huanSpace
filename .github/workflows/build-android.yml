name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android licenses & install components
      run: |
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    - name: Install dependencies
      run: npm install

    - name: Build APK
      run: |
        echo "=== Step 1: Add Platform ==="
        npx cordova@12 platform add android@13.0.0 --no-interactive --no-update-notifier

        echo "=== Step 2: Check Gradle Wrapper ==="
        cat platforms/android/gradle/wrapper/gradle-wrapper.properties || echo "No wrapper file"
        
        echo "=== Step 3: Make gradlew executable ==="
        chmod +x platforms/android/gradlew || true

        echo "=== Step 4: Test Gradle ==="
        cd platforms/android && ./gradlew --version || echo "Gradle test done" && cd ../..

        echo "=== Step 5: Build APK (with verbose output) ==="
        npx cordova@12 build android --debug --no-interactive --no-update-notifier --buildConfig='{"cdvMinSdkVersion":22}' || {
          echo "=== BUILD FAILED! Showing Gradle error details ==="
          cat platforms/android/build/reports/lint-results-debug.xml 2>/dev/null || true
          find platforms/android/build -name "*.log" -exec cat {} \; 2>/dev/null || true
          exit 1
        }

        echo "=== Done! Listing output ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: huanSpace-debug-APK
        path: |
          platforms/android/app/build/outputs/apk/debug/app-debug.apk
          platforms/android/build/outputs/apk/debug/*.apk
        retention-days: 30
