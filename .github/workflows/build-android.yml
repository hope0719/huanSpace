name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Setup Android SDK & Build APK
      run: |
        sudo apt-get update && sudo apt-get install -y wget unzip
        
        export ANDROID_HOME=$HOME/Android/Sdk
        mkdir -p $ANDROID_HOME/cmdline-tools
        cd $ANDROID_HOME/cmdline-tools
        
        curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
        unzip -q tools.zip && mv cmdline-tools latest && rm tools.zip
        
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-34" "build-tools;34.0.0"
        
        cd $GITHUB_WORKSPACE
        
        echo "=== Step 1: Add Android Platform ==="
        npx cordova@12 platform add android@12.0.0 --no-interactive --no-update-notifier
        
        echo "=== Step 2: Build Debug APK ==="
        npx cordova@12 build android --debug --no-interactive --no-update-notifier
        
        echo "=== Build Complete ==="
        ls -la platforms/android/app/build/outputs/apk/debug/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: huanSpace-debug-APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
