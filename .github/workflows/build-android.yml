name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: subosito/android-action@v1
      with:
        api-level: 34
        build-tools: 34.0.0
        arch: x64
        cache: true

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Accept licenses & build
      run: |
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        npx cordova@12 build android --debug --no-interactive

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: huanSpace-debug-APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
