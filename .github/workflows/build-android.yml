name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Cordova
      run: npm install -g cordova@latest

    - name: Install project dependencies
      run: npm install

    - name: Add Android platform
      run: cordova platform add android@latest || true

    - name: Build Android APK (debug)
      run: cordova build android

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: huanSpace-APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Create Release with APK
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: 幻影空间 v1.0.${{ github.run_number }}
        files: platforms/android/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
