name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 🔑 安装兼容的 Gradle 7.6（Cordova Android 12 要求）
    - name: Install Gradle 7.6
      run: |
        echo "=== Installing Gradle 7.6 (compatible with Cordova Android 12) ==="
        cd /tmp
        curl -fsSL https://services.gradle.org/distributions/gradle-7.6-bin.zip -o gradle.zip
        sudo unzip -q gradle.zip -d /opt/
        sudo ln -sf /opt/gradle-7.6/bin/gradle /usr/local/bin/gradle
        rm gradle.zip
        gradle --version | head -3
        echo "✅ Gradle 7.6 installed"

    - name: Install dependencies
      run: npm install

    - name: Setup Android SDK & Build APK
      run: |
        sudo apt-get update && sudo apt-get install -y wget unzip

        export ANDROID_HOME=$HOME/Android/Sdk
        mkdir -p $ANDROID_HOME/cmdline-tools
        cd $ANDROID_HOME/cmdline-tools

        curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
        unzip -q tools.zip && mv cmdline-tools latest && rm tools.zip

        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools

        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-34" "build-tools;34.0.0"

        cd $GITHUB_WORKSPACE

        echo "=== Step 1: Add Platform ==="
        npx cordova@12 platform add android@12.0.0 --no-interactive --no-update-notifier

        echo "=== Step 2: Build APK ==="
        npx cordova@12 build android --debug --no-interactive --no-update-notifier

        echo "=== Done! Listing output ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: huanSpace-debug-APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
