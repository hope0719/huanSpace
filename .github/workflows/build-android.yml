name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Setup Android SDK & Build
      run: |
        # 安装 Android SDK 命令行工具
        sudo apt-get update && sudo apt-get install -y wget unzip openjdk-17-jdk-headless
        
        export ANDROID_HOME=$HOME/Android/Sdk
        mkdir -p $ANDROID_HOME/cmdline-tools
        cd $ANDROID_HOME/cmdline-tools
        
        echo "Downloading Android SDK cmdline-tools..."
        curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
        
        echo "Extracting..."
        unzip -q tools.zip
        mv cmdline-tools latest
        rm tools.zip
        
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        
        echo "Accepting licenses..."
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        
        echo "Installing platform and build-tools..."
        sdkmanager "platforms;android-34" "build-tools;34.0.0"
        
        cd $GITHUB_WORKSPACE
        
        echo "=== Building APK ==="
        npx cordova@12 build android --debug --no-interactive

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: huanSpace-debug-APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
