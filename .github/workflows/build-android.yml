name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform
        run: npx cordova platform add android --no-interactive --no-update-notifier

      - name: Build debug APK
        run: npx cordova build android --debug --no-interactive --no-update-notifier

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: huanSpace-debug-APK
          path: platforms/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
